# zap-baseline.conf

# OWASP ZAP Baseline Scan Configuration
# This configuration file sets up the parameters for running a baseline scan with OWASP ZAP.

# Target URL for the scan
target.url=http://localhost:8080

# Output file for the scan report
output.file=zap-baseline-report.html

# Set the scan mode (full or baseline)
scan.mode=baseline

# Enable or disable specific alerts
alert.level=medium

# Specify the maximum number of threads to use during the scan
max.threads=5

# Timeout settings for the scan
timeout=300

# Additional options for the scan
additional.options=-a

# Enable or disable the generation of a report
generate.report=true

# Specify the format of the report (HTML, XML, etc.)
report.format=html

# Include or exclude specific plugins
include.plugins=all
exclude.plugins=none

# Set the level of detail for the scan
scan.detail=full

# Enable or disable the use of authentication
authentication.enabled=false

# Specify the authentication method if enabled
authentication.method=none

# End of configuration file